name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Code Formatting
        run: |
          git fetch origin ${{ github.base_ref || 'main' }} --depth=1
          TARGET_BRANCH="origin/${{ github.base_ref || 'main' }}"
          CHANGED_FILES=$(git diff --name-only $TARGET_BRANCH...HEAD | grep -E '\.(js|jsx|ts|tsx|css|html|json|md|yml|yaml)$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            npx prettier --check $CHANGED_FILES
          else
            echo "No changed files to check."
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Run Lint checks
        run: npm run lint

      - name: Run Type Check
        run: npm run typecheck

  prettier:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Prettier Check
        run: |
          git fetch origin ${{ github.base_ref || 'main' }} --depth=1
          TARGET_BRANCH="origin/${{ github.base_ref || 'main' }}"
          CHANGED_FILES=$(git diff --name-only $TARGET_BRANCH...HEAD | grep -E '\.(js|jsx|ts|tsx|css|html|json|md|yml|yaml)$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            npx prettier --check $CHANGED_FILES
          else
            echo "No changed files to check."
          fi

  build:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Verify Production Build
        run: npm run build

  db-migrations:
    name: Verify Database Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Copy CI Supabase config
        run: cp supabase/config.ci.toml supabase/config.toml

      - name: Start local Supabase
        run: supabase start

      - name: Verify database migrations
        run: supabase db reset

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
