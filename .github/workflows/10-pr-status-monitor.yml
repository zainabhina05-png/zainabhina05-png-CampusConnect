name: "10 PR Status Monitor"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: ["CI Pipeline", "05 PR Validation", "PR Verification (Safe Merge Check)"]
    types: [completed]
  check_run:
    types: [completed]
  push:
    branches:
      - main
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate (leave empty to scan ALL open PRs)"
        required: false
        type: string

permissions:
  pull-requests: write
  issues: write
  checks: read
  actions: read
  contents: write

concurrency:
  group: pr-status-monitor-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.event.check_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  monitor:
    name: Monitor CI Checks & Label PR
    runs-on: ubuntu-latest
    steps:
      - name: Wait 5 minutes for all checks to register
        if: github.event_name == 'pull_request_target'
        run: |
          echo "⏳ Waiting 5 minutes for all CI checks to spin up and register..."
          sleep 300
          echo "✅ Done waiting. Now polling check results..."

      - name: Evaluate all checks and label PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const { owner, repo } = context.repo;

            // Helper to find open PRs for a specific commit SHA
            async function getPRsForCommit(sha) {
              let page = 1;
              let allOpenPrs = [];
              while (true) {
                const { data: openPrs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100, page });
                allOpenPrs = allOpenPrs.concat(openPrs);
                if (openPrs.length < 100) break;
                page++;
              }
              return allOpenPrs.filter(pr => pr.head.sha === sha);
            }

            // ─── Resolve which PRs to process ──────────────────────────────────
            let prsToProcess = [];

            if (context.eventName === 'pull_request_target') {
              // Triggered by a PR event — process that single PR
              const pr = context.payload.pull_request;
              // Re-fetch to get the mergeable field (payload may not have it)
              const { data: fullPr } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
              prsToProcess = [{ number: fullPr.number, headSha: fullPr.head.sha, assignees: fullPr.assignees, author: fullPr.user.login, mergeable: fullPr.mergeable, mergeable_state: fullPr.mergeable_state }];
            } else if (context.eventName === 'workflow_run') {
              const sha = context.payload.workflow_run.head_sha;
              const matchingPrs = await getPRsForCommit(sha);
              if (matchingPrs.length > 0) {
                const pr = matchingPrs[0];
                const { data: fullPr } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
                prsToProcess = [{ number: fullPr.number, headSha: fullPr.head.sha, assignees: fullPr.assignees, author: fullPr.user.login, mergeable: fullPr.mergeable, mergeable_state: fullPr.mergeable_state }];
              } else {
                console.log(`No open pull requests found for workflow_run head SHA: ${sha}. Exiting.`);
                return;
              }
            } else if (context.eventName === 'check_run') {
              const sha = context.payload.check_run.head_sha;
              const matchingPrs = await getPRsForCommit(sha);
              if (matchingPrs.length > 0) {
                const pr = matchingPrs[0];
                const { data: fullPr } = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
                prsToProcess = [{ number: fullPr.number, headSha: fullPr.head.sha, assignees: fullPr.assignees, author: fullPr.user.login, mergeable: fullPr.mergeable, mergeable_state: fullPr.mergeable_state }];
              } else {
                console.log(`No open pull requests found for check_run head SHA: ${sha}. Exiting.`);
                return;
              }
            } else {
              // Triggered manually via workflow_dispatch or push to main
              const inputPrNumber = context.payload.inputs?.pr_number;
              if (inputPrNumber && inputPrNumber.trim() !== '') {
                // Specific PR number was provided
                const { data: prData } = await github.rest.pulls.get({ owner, repo, pull_number: parseInt(inputPrNumber) });
                prsToProcess = [{ number: prData.number, headSha: prData.head.sha, assignees: prData.assignees, author: prData.user.login, mergeable: prData.mergeable, mergeable_state: prData.mergeable_state }];
              } else {
                // No PR number provided — fetch ALL open PRs
                // Must use pulls.get() per PR to get the mergeable field
                let page = 1;
                let listedPRs = [];
                while (true) {
                  const { data: openPRs } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100, page });
                  listedPRs = listedPRs.concat(openPRs);
                  if (openPRs.length < 100) break;
                  page++;
                }
                console.log(`Found ${listedPRs.length} open PRs. Fetching full details for mergeable status...`);
                for (const p of listedPRs) {
                  try {
                    const { data: fullPr } = await github.rest.pulls.get({ owner, repo, pull_number: p.number });
                    prsToProcess.push({ number: fullPr.number, headSha: fullPr.head.sha, assignees: fullPr.assignees, author: fullPr.user.login, mergeable: fullPr.mergeable, mergeable_state: fullPr.mergeable_state });
                  } catch(e) {
                    console.error(`Could not fetch full data for PR #${p.number}: ${e.message}`);
                    prsToProcess.push({ number: p.number, headSha: p.head.sha, assignees: p.assignees, author: p.user.login, mergeable: null, mergeable_state: null });
                  }
                }
                console.log(`Loaded full details for ${prsToProcess.length} PRs.`);
              }
            }

            // ─── Helper function: evaluate + label a single PR ──────────────────
            async function evaluatePR({ number: prNumber, headSha, assignees, author, mergeable, mergeable_state }) {
              console.log(`\n🔍 Evaluating PR #${prNumber} (SHA: ${headSha})...`);

              // ─── 1. Fetch ALL check runs for this commit ──────────────────────
              let allCheckRuns = [];
              let checkPage = 1;
              while (true) {
                const { data } = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: headSha,
                  per_page: 100,
                  page: checkPage,
                });
                allCheckRuns = allCheckRuns.concat(data.check_runs);
                if (data.check_runs.length < 100) break;
                checkPage++;
              }

              // ─── 2. Filter out this workflow itself and Vercel ─────────────────
              const relevantChecks = allCheckRuns.filter((check) => {
                const name = check.name.toLowerCase();
                return (
                  !name.includes("vercel") &&
                  !name.includes("pr status monitor") &&
                  !name.includes("monitor ci checks")
                );
              });

              if (relevantChecks.length === 0) {
                console.log(`PR #${prNumber}: No relevant checks found yet. Skipping.`);
                return;
              }

              console.log(`PR #${prNumber}: Found ${relevantChecks.length} relevant checks.`);

              // ─── 3. Separate failing and pending checks ────────────────────────
              const failedChecks = relevantChecks.filter((check) => {
                const conclusion = (check.conclusion || "").toLowerCase();
                const status = (check.status || "").toLowerCase();
                return (
                  conclusion === "failure" ||
                  conclusion === "cancelled" ||
                  conclusion === "timed_out" ||
                  (status === "completed" && conclusion === "action_required")
                );
              });

              const pendingChecks = relevantChecks.filter((check) => check.status !== "completed");

              // ─── 4. Get the PR assignee (fallback to PR author) ───────────────
              const targetUser = (assignees || []).length > 0 ? assignees[0].login : author;

              // ─── 5. Get existing labels on this PR ────────────────────────────
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner, repo, issue_number: prNumber,
              });
              const currentLabelNames = currentLabels.map((l) => l.name);

              const addLabel = async (label) => {
                if (!currentLabelNames.includes(label)) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [label] });
                  currentLabelNames.push(label);
                }
              };
              const removeLabel = async (label) => {
                if (currentLabelNames.includes(label)) {
                  try {
                    await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: label });
                    const idx = currentLabelNames.indexOf(label);
                    if (idx > -1) currentLabelNames.splice(idx, 1);
                  } catch (e) { console.log(`Could not remove label "${label}": ${e.message}`); }
                }
              };

              // ─── Enforce exactly one target label (Fail-safe) ──────────────────
              const targetLabels = ['good-ui', 'good-backend', 'good-pr', 'good-issue'];
              const foundTargetLabels = targetLabels.filter(label => currentLabelNames.includes(label));
              if (foundTargetLabels.length > 1) {
                const priority = ['good-ui', 'good-backend', 'good-pr', 'good-issue'];
                let labelToKeep = null;
                for (const p of priority) {
                  if (foundTargetLabels.includes(p)) {
                    labelToKeep = p;
                    break;
                  }
                }
                for (const label of foundTargetLabels) {
                  if (label !== labelToKeep) {
                    console.log(`PR #${prNumber}: Removing duplicate/conflicting target label "${label}"`);
                    await removeLabel(label);
                  }
                }
              }

              // ─── 6a. MERGE CONFLICT CHECK (highest priority) ──────────────────
              // mergeable: null means GitHub is still computing — retry up to 3x
              let mergeableState = mergeable;
              let currentMergeableStateString = mergeable_state;
              if (mergeableState === null) {
                for (let attempt = 1; attempt <= 3; attempt++) {
                  console.log(`PR #${prNumber}: mergeable is null, retrying (${attempt}/3) after 10s...`);
                  await new Promise(r => setTimeout(r, 10000));
                  try {
                    const { data: freshPr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                    mergeableState = freshPr.mergeable;
                    currentMergeableStateString = freshPr.mergeable_state;
                    if (mergeableState !== null) break;
                  } catch(e) { console.error(`Retry fetch failed: ${e.message}`); }
                }
              }

              if (mergeableState === false) {
                await removeLabel("Blue");
                await addLabel("Red");
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: `@${targetUser} ⚠️ This PR has **merge conflicts**. Please resolve them before it can be merged.`
                });
                console.log(`⚠️ PR #${prNumber} labeled "Red" — merge conflicts detected.`);
                return;
              }

              if (mergeableState === null) {
                console.log(`PR #${prNumber}: Could not determine mergeability after retries. Skipping conflict check.`);
              }

              // ─── 6b. AWAITING APPROVAL CHECK ──────────────────────────
              // When a first-time contributor opens a PR, GitHub requires a maintainer
              // to approve CI workflows. These show up as workflow runs with
              // status='action_required'. If any exist, label Red so maintainer notices.
              try {
                const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner, repo, head_sha: headSha, per_page: 50,
                });
                const awaitingApproval = workflowRuns.workflow_runs.filter(
                  (run) => run.status === 'action_required'
                );
                if (awaitingApproval.length > 0) {
                  await removeLabel("Blue");
                  await addLabel("Red");
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: `@${context.repo.owner} ⏳ This PR from @${targetUser} has **${awaitingApproval.length} workflow(s) awaiting your approval** before CI can run. Please approve them in the Actions tab.`
                  });
                  console.log(`⏳ PR #${prNumber} labeled "Red" — workflows awaiting approval.`);
                  return;
                }
              } catch(e) {
                console.log(`Could not check workflow runs: ${e.message}`);
              }

              // ─── 6b. Still pending CI? Log and skip ───────────────────────────
              if (pendingChecks.length > 0 && failedChecks.length === 0) {
                const names = pendingChecks.map((c) => `\`${c.name}\``).join(", ");
                console.log(`PR #${prNumber}: Checks still pending: ${names}. Skipping.`);
                return;
              }

              // ─── 7. FAILURE PATH ───────────────────────────────────────────────
              if (failedChecks.length > 0) {
                await removeLabel("Blue");
                await addLabel("Red");
                const failedNames = failedChecks.map((c) => `**${c.name}**`).join(", ");
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: `@${targetUser} ❌ CI checks failing: ${failedNames}. Please fix and push again.`
                });
                console.log(`❌ PR #${prNumber} labeled "Red" — ${failedChecks.length} check(s) failed.`);
                return;
              }

              // ─── 8. SUCCESS PATH ───────────────────────────────────────────────
              await removeLabel("Red");
              await addLabel("Blue");

              const state = (currentMergeableStateString || "").toLowerCase();
              console.log(`PR #${prNumber} mergeable_state: "${state}"`);

              if (state === "clean" || state === "has_hooks" || state === "unstable" || state === "") {
                try {
                  console.log(`🚀 Auto-merging PR #${prNumber}...`);
                  await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number: prNumber,
                    merge_method: 'squash'
                  });
                  console.log(`✅ PR #${prNumber} successfully auto-merged!`);
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: `@${targetUser} ✅ All CI checks passed! This PR has been automatically merged.`
                  });
                } catch (mergeError) {
                  console.error(`❌ Failed to auto-merge PR #${prNumber}: ${mergeError.message}`);
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: `⚠️ **Auto-Merge Failed:** ${mergeError.message}. Please merge manually.`
                  });
                }
              } else if (state === "behind") {
                try {
                  console.log(`🔄 PR #${prNumber} is behind main. Automatically updating branch...`);
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: `@${targetUser} 🔄 This PR is behind the main branch. Automatically updating it with the latest changes from main to run CI again...`
                  });
                  await github.rest.pulls.updateBranch({
                    owner,
                    repo,
                    pull_number: prNumber
                  });
                  console.log(`✅ PR #${prNumber} branch successfully updated.`);
                } catch (updateError) {
                  console.error(`❌ Failed to update branch for PR #${prNumber}: ${updateError.message}`);
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: `⚠️ **Branch Update Failed:** ${updateError.message}. If this is a fork, please ensure "Allow edits from maintainers" is checked, or manually update your branch with main.`
                  });
                }
              } else {
                console.log(`PR #${prNumber} is in state "${state}". Skipping auto-merge/update.`);
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: `@${targetUser} ✅ All CI checks passed! Status: \`${state}\`. Please review and merge manually.`
                });
              }
            }

            // ─── Process all PRs sequentially ──────────────────────────────────
            for (const pr of prsToProcess) {
              try {
                await evaluatePR(pr);
              } catch (err) {
                console.error(`Error processing PR #${pr.number}: ${err.message}`);
              }
            }
            console.log(`\n✅ Done processing ${prsToProcess.length} PR(s).`);
