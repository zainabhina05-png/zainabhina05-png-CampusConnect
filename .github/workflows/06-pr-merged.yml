name: "06 PR Merged"

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  merged-bot-action:
    name: Run PR Merged Bot
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    concurrency:
      group: pr-merged-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Process merged PR
        uses: actions/github-script@v8
        with:
          script: |
            const { processPrMerged } = await import(`${process.cwd()}/.github/scripts/pr.js`);
            await processPrMerged({ github, context, core });

  label-merged-pr:
    name: Label Merged PR
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Randomly select a label
        id: pick-label
        run: |
          LABELS=("good-issue" "good-pr" "good-ui" "good-backend")
          SELECTED_LABEL=${LABELS[$RANDOM % ${#LABELS[@]}]}
          echo "selected_label=$SELECTED_LABEL" >> $GITHUB_OUTPUT

      - name: Add labels to PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_request = context.payload.pull_request;

            // Check if PR already has labels
            if (pull_request.labels && pull_request.labels.length > 0) {
              console.log('PR already has labels. Skipping label addition.');
              return;
            }

            const issue_number = pull_request.number;
            const selected_label = '${{ steps.pick-label.outputs.selected_label }}';

            const labelsToAdd = ['ECSoC26', selected_label];

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: labelsToAdd
            });

  update-contributors:
    name: Update Contributors Gallery
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.type != 'Bot' &&
      github.event.pull_request.head.ref != 'automation/update-contributors'
    runs-on: ubuntu-latest
    concurrency:
      group: contributors-gallery
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Regenerate contributors gallery
        run: node scripts/update-contributors.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.pull_request.base.ref }}

      - name: Create contributors update pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-contributors
          delete-branch: true
          title: "docs: update contributors gallery"
          commit-message: "docs: update contributors gallery"
          body: |
            Automated contributor gallery refresh after a merged pull request.

            - Rebuilt from full repository history
            - Updated Hall of Fame (Top 5)
            - Updated All Contributors avatars
          labels: |
            documentation
            automation
          add-paths: |
            README.md

      - name: Check if auto-merge is enabled
        id: check-automerge
        run: |
          allow_auto_merge=$(gh api repos/${{ github.repository }} --jq '.allow_auto_merge')
          echo "allow_auto_merge=$allow_auto_merge" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != '' && steps.check-automerge.outputs.allow_auto_merge == 'true'
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: merge
