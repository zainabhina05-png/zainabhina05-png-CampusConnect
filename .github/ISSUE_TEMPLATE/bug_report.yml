name: Bug Report
description: Create a report to help us improve CampusConnect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or screen recordings to help explain your problem.
  - type: input
    id: browser
    attributes:
      label: Browser Version
      description: Enter the browser name and version.
      placeholder: Chrome 139.0.7258.67
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Enter your operating system and version.
      placeholder: Windows 11 / macOS Sequoia / Ubuntu 24.04
    validations:
      required: true
